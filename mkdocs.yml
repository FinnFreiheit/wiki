site_name: Elektronischer Rechtsverkehr
site_url: https://finnfreiheit.github.io/wiki/
site_description: Wiki zum Elektronischen Rechtsverkehr mit der Justiz

theme:
  name: material
  language: de
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tooltips
    - toc.follow

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Startseite: index.md
  - Zielsetzung: zielsetzung.md
  - Rechtliche Rahmenbedingungen: rechtliche-rahmenbedingungen.md
  - Das Grundprinzip: grundprinzip.md
  - Übermittlung der Nachrichten: uebermittlung.md
  - Inhalt der Nachrichten: inhalt-der-nachrichten.md
  - Weiterverarbeitung: weiterverarbeitung.md
  - XJustiz: xjustiz.md
  - Fachspezifische Szenarien: fachspezifische-szenarien.md
  - Bußgeldverfahren (Anlage): bussgeldverfahren.md
