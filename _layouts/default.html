<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #24292e;
      --sidebar-bg: #f6f8fa;
      --border: #e1e4e8;
      --link: #0366d6;
      --code-bg: #f6f8fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      min-height: 100vh;
    }
    nav.sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      flex-shrink: 0;
    }
    nav.sidebar h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    nav.sidebar h2 a {
      text-decoration: none;
      color: var(--text);
    }
    nav.sidebar ul {
      list-style: none;
    }
    nav.sidebar li {
      margin-bottom: 0.4rem;
    }
    nav.sidebar a {
      color: var(--link);
      text-decoration: none;
      font-size: 0.95rem;
    }
    nav.sidebar a:hover {
      text-decoration: underline;
    }
    main {
      flex: 1;
      max-width: 800px;
      padding: 2rem 3rem;
    }
    main h1 { font-size: 2rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    main h2 { font-size: 1.5rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    main h3 { font-size: 1.25rem; margin-top: 1.2rem; margin-bottom: 0.4rem; }
    main p { line-height: 1.7; margin-bottom: 1rem; }
    main a { color: var(--link); }
    main ul, main ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    main li { line-height: 1.7; }
    main code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    main pre {
      background: var(--code-bg);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    main pre code {
      padding: 0;
      background: none;
    }
    main table {
      border-collapse: collapse;
      margin-bottom: 1rem;
      width: 100%;
    }
    main th, main td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    main th {
      background: var(--sidebar-bg);
    }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      nav.sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <h2><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h2>
    <ul>
      {% for p in site.pages %}
        {% if p.layout == 'page' %}
        <li><a href="{{ p.url | relative_url }}">{{ p.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
